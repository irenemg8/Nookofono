name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Permite lanzarlo a mano desde la pestaña Actions.
  workflow_dispatch:

# Sólo un despliegue a la vez. Si se empuja dos veces seguidas, la segunda
# espera a que termine la primera en vez de pisarla.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      # Sin esto el bundle se construye para la raíz del dominio y en
      # irenemg8.github.io/Nookofono/ los assets darían 404. Ver vite.config.ts.
      - run: npm run build
        env:
          DEPLOY_TARGET: pages

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
