# iPug en el VPS (visiclaw) — https://ipug.vrlabs.es
#
# Diferencias con `docker-compose.yml` (el de desarrollo):
#
#   - **Ningún puerto publicado.** Ni la API ni la base asoman al exterior:
#     `vrlabs-caddy` habla con `ipug-app` por la red `vrlabs-network`, y la base
#     sólo la ve la API. En desarrollo se publica 5439 para poder inspeccionar
#     la base desde el portátil; aquí eso sería exponerla a Internet.
#   - **Una sola red**, `vrlabs-network`, que es la que comparten todos los
#     proyectos del VPS y a la que está conectado Caddy.
#   - **Sin valores por defecto en los secretos.** Un `POSTGRES_PASSWORD=ipug`
#     accidental en producción es una base abierta; mejor que el arranque falle.
services:
  ipug-db:
    # pgvector/pgvector en vez de postgres a secas: RAG-Pugtín guarda embeddings
    # (columna `vector`) y la extensión `vector` sólo viene en esta imagen.
    image: pgvector/pgvector:pg17
    container_name: ipug-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ipug}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?falta POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ipug}
    volumes:
      - ipug-pgdata:/var/lib/postgresql/data
    healthcheck:
      # `pg_isready` responde antes de que la base acepte conexiones de verdad;
      # con una consulta real se evita que la API arranque demasiado pronto.
      test: ["CMD-SHELL", "psql -U $${POSTGRES_USER} -d $${POSTGRES_DB} -c 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks: [vrlabs-network]

  ipug-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ipug-app
    container_name: ipug-app
    restart: unless-stopped
    depends_on:
      ipug-db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "8011"
      DATABASE_URL: postgres://${POSTGRES_USER:-ipug}:${POSTGRES_PASSWORD:?falta POSTGRES_PASSWORD}@ipug-db:5432/${POSTGRES_DB:-ipug}
      JWT_SECRET: ${JWT_SECRET:?falta JWT_SECRET}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-30}
      TOTP_WINDOW: ${TOTP_WINDOW:-1}
      RATE_LIMIT_AUTH_MAX: ${RATE_LIMIT_AUTH_MAX:-5}
      RATE_LIMIT_AUTH_WINDOW_S: ${RATE_LIMIT_AUTH_WINDOW_S:-900}
      STATIC_ROOT: ./public
      # Dónde van los binarios de fotos y ficheros (RAG-Pugtín). Volumen aparte
      # del código para que sobreviva a los despliegues.
      BLOB_ROOT: /data/blobs
      # Caché del modelo de embeddings (all-MiniLM-L6-v2). Sin esto se
      # redescarga en cada arranque del contenedor.
      TRANSFORMERS_CACHE: /data/models
    volumes:
      - ipug-blobs:/data/blobs
      - ipug-models:/data/models
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8011/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [vrlabs-network]

volumes:
  ipug-pgdata:
  ipug-blobs:
  ipug-models:

networks:
  # La crea la pila de Caddy; aquí sólo nos enganchamos.
  vrlabs-network:
    external: true
